<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expenses — Fundora</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body>
<div class="layout-with-sidebar">
  <aside class="sidebar">
    <a href="index.html" class="sidebar__logo"><img src="icons/Logo trans.png" alt="Fundora"/><span class="sidebar__logo-text">Fundora</span></a>
    <nav class="sidebar__nav">
      <a href="dashboard.html" class="sidebar__nav-item" id="nav-dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="income.html" class="sidebar__nav-item" id="nav-income"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Income</a>
      <a href="expenses.html" class="sidebar__nav-item active" id="nav-expenses"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7M12 7H7.5a2.5 2.5 0 010-5H12M12 7h4.5a2.5 2.5 0 000-5H12"/></svg>Expenses</a>
      <a href="history.html" class="sidebar__nav-item" id="nav-history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3M3 12a9 9 0 1018 0 9 9 0 00-18 0"/></svg>History</a>
      <a href="settings.html" class="sidebar__nav-item" id="nav-settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user"><div class="sidebar__user-avatar" id="sidebar-avatar">U</div><div><div class="sidebar__user-name" id="sidebar-name">User</div><a href="#" id="logout-btn" class="sidebar__user-logout">Sign out</a></div></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header flex-between">
      <div>
        <h1 class="page-header__title">Expenses</h1>
        <p class="page-header__sub">Log and manage your spending</p>
      </div>
      <button class="btn btn--primary btn--sm" id="open-expense-modal">+ Add Expense</button>
    </div>

    <div id="expense-alerts" class="mb-lg"></div>

    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card stat-card--expense">
        <div class="stat-card__label">This Month</div>
        <div class="stat-card__value" id="expense-this-month">Rs. 0</div>
      </div>
      <div class="stat-card stat-card--expense">
        <div class="stat-card__label">Total Entries</div>
        <div class="stat-card__value" id="expense-count">0</div>
      </div>
      <div class="stat-card stat-card--expense">
        <div class="stat-card__label">Top Category</div>
        <div class="stat-card__value" id="expense-top-cat" style="font-size:1.2rem;">—</div>
      </div>
    </div>

    <!-- Category Filter -->
    <div class="flex flex-gap-sm flex-wrap mb-lg">
      <button class="btn btn--ghost btn--sm filter-btn active" data-cat="all" id="filter-all">All</button>
      <button class="btn btn--ghost btn--sm filter-btn" data-cat="Food" id="filter-food">🍜 Food</button>
      <button class="btn btn--ghost btn--sm filter-btn" data-cat="Transport" id="filter-transport">🚌 Transport</button>
      <button class="btn btn--ghost btn--sm filter-btn" data-cat="Rent" id="filter-rent">🏠 Rent</button>
      <button class="btn btn--ghost btn--sm filter-btn" data-cat="Entertainment" id="filter-entertainment">🎮 Entertainment</button>
      <button class="btn btn--ghost btn--sm filter-btn" data-cat="Health" id="filter-health">💊 Health</button>
      <button class="btn btn--ghost btn--sm filter-btn" data-cat="Education" id="filter-education">📚 Education</button>
      <button class="btn btn--ghost btn--sm filter-btn" data-cat="Other" id="filter-other">📦 Other</button>
    </div>

    <div class="card card--flat">
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr><th>Date</th><th>Category</th><th>Description</th><th class="text-right">Amount</th><th>Action</th></tr>
          </thead>
          <tbody id="expense-table-body">
            <tr><td colspan="5" class="text-center text-muted" style="padding:32px;">No expenses yet. Add your first one!</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ADD EXPENSE MODAL -->
<div class="modal-overlay" id="expense-modal">
  <div class="modal">
    <div class="modal__header">
      <h3>Add Expense</h3>
      <button class="modal__close" id="close-expense-modal">✕</button>
    </div>
    <form id="expense-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="exp-category">Category</label>
        <select class="form-select" id="exp-category" required>
          <option value="">Select category</option>
          <option value="Food">🍜 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Rent">🏠 Rent</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="exp-amount">Amount (Rs.)</label>
        <input class="form-input" type="number" id="exp-amount" min="1" step="0.01" placeholder="0.00" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="exp-description">Description</label>
        <input class="form-input" type="text" id="exp-description" placeholder="e.g. Lunch at canteen"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="exp-date">Date</label>
        <input class="form-input" type="date" id="exp-date" required/>
      </div>
      <div class="flex flex-gap-md" style="justify-content:flex-end;">
        <button type="button" class="btn btn--ghost" id="cancel-expense-modal">Cancel</button>
        <button type="submit" class="btn btn--danger" id="save-expense-btn">Save Expense</button>
      </div>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/transactions.js"></script>
<script src="js/alerts.js"></script>
<script src="js/expenses.js"></script>
</body>
</html>
