<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Fundora</title>
  <meta name="description" content="Create your free Fundora account to start tracking your student finances."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
  </div>

  <div class="auth-card animate-fade-up">
    <a href="index.html" class="auth-card__logo">
      <img src="icons/Logo trans.png" alt="Fundora"/>
      <span>Fundora</span>
    </a>
    <h1 class="auth-card__title">Create your account</h1>
    <p class="auth-card__sub">Start managing your finances today</p>

    <div id="auth-alert" class="hidden" style="margin-bottom:16px;"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input class="form-input" type="text" id="reg-name" name="name" placeholder="Your name" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email</label>
        <input class="form-input" type="email" id="reg-email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input class="form-input" type="password" id="reg-password" name="password" placeholder="Min 8 characters" required minlength="8"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-confirm">Confirm Password</label>
        <input class="form-input" type="password" id="reg-confirm" name="confirm" placeholder="Repeat password" required/>
      </div>
      <button class="btn btn--primary w-full" id="register-btn" type="submit">Create Account</button>
    </form>

    <p class="auth-card__footer">
      Already have an account? <a href="login.html">Sign in →</a>
    </p>
  </div>
</div>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
