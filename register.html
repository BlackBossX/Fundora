<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Fundora</title>
  <meta name="description" content="Create your free Fundora account to start tracking your student finances."/>
  <link rel="stylesheet" href="assets/css/style.css?v=1.5"/>
  <link rel="stylesheet" href="assets/css/auth.css?v=1.3"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
  </div>

  <div class="auth-card animate-fade-up">
    <a href="index.html" class="auth-card__logo">
      <img src="assets/icons/Logo trans.png" alt="Fundora"/>
      <span>Fundora</span>
    </a>
    <h1 class="auth-card__title">Create your account</h1>
    <p class="auth-card__sub">Start managing your finances today</p>

    <div id="auth-alert" class="hidden" style="margin-bottom:16px;" role="alert"></div>

    <form id="register-form" novalidate autocomplete="off">

      <!-- Full Name -->
      <div class="form-group" id="grp-reg-name">
        <label class="form-label" for="reg-name">Full Name</label>
        <input class="form-input" type="text" id="reg-name" name="name"
               placeholder="Your full name" autocomplete="name" required/>
        <span class="field-error" id="err-reg-name" aria-live="polite"></span>
      </div>

      <!-- Email -->
      <div class="form-group" id="grp-reg-email">
        <label class="form-label" for="reg-email">Email</label>
        <input class="form-input" type="email" id="reg-email" name="email"
               placeholder="you@example.com" autocomplete="email" required/>
        <span class="field-error" id="err-reg-email" aria-live="polite"></span>
      </div>

      <!-- Password -->
      <div class="form-group" id="grp-reg-password">
        <label class="form-label" for="reg-password">Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="reg-password" name="password"
                 placeholder="Min 8 characters" autocomplete="new-password" required minlength="8"/>
          <button type="button" class="toggle-pw" id="toggle-reg-pw" aria-label="Show password" tabindex="-1">
            <svg id="eye-reg-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-reg-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="field-error" id="err-reg-password" aria-live="polite"></span>
        <!-- Password strength bar -->
        <div class="pw-strength" id="pw-strength-bar" aria-hidden="true">
          <div class="pw-strength__track">
            <div class="pw-strength__fill" id="pw-strength-fill"></div>
          </div>
          <span class="pw-strength__label" id="pw-strength-label"></span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group" id="grp-reg-confirm">
        <label class="form-label" for="reg-confirm">Confirm Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="reg-confirm" name="confirm"
                 placeholder="Repeat password" autocomplete="new-password" required/>
          <button type="button" class="toggle-pw" id="toggle-reg-confirm" aria-label="Show password" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-error" id="err-reg-confirm" aria-live="polite"></span>
      </div>

      <button class="btn btn--primary w-full" id="register-btn" type="submit">Create Account</button>
    </form>

    <p class="auth-card__footer">
      Already have an account? <a href="login.html">Sign in →</a>
    </p>
  </div>
</div>
<script src="assets/js/app.js?v=1.2"></script>
<script src="assets/js/auth.js?v=1.3"></script>
</body>
</html>
