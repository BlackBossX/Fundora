<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — Fundora</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body>
<div class="layout-with-sidebar">
  <aside class="sidebar">
    <a href="index.html" class="sidebar__logo"><img src="icons/Logo trans.png" alt="Fundora"/><span class="sidebar__logo-text">Fundora</span></a>
    <nav class="sidebar__nav">
      <a href="dashboard.html" class="sidebar__nav-item" id="nav-dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="income.html" class="sidebar__nav-item" id="nav-income"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Income</a>
      <a href="expenses.html" class="sidebar__nav-item" id="nav-expenses"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7M12 7H7.5a2.5 2.5 0 010-5H12M12 7h4.5a2.5 2.5 0 000-5H12"/></svg>Expenses</a>
      <a href="history.html" class="sidebar__nav-item active" id="nav-history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3M3 12a9 9 0 1018 0 9 9 0 00-18 0"/></svg>History</a>
      <a href="settings.html" class="sidebar__nav-item" id="nav-settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user"><div class="sidebar__user-avatar" id="sidebar-avatar">U</div><div><div class="sidebar__user-name" id="sidebar-name">User</div><a href="#" id="logout-btn" class="sidebar__user-logout">Sign out</a></div></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-header__title">Transaction History</h1>
      <p class="page-header__sub">Browse and filter all your financial activity</p>
    </div>

    <!-- Filters -->
    <div class="card card--flat mb-lg">
      <div class="flex flex-gap-md flex-wrap">
        <div class="form-group" style="margin:0;flex:1;min-width:180px;">
          <label class="form-label" for="hist-search">Search</label>
          <input class="form-input" type="text" id="hist-search" placeholder="Search transactions..."/>
        </div>
        <div class="form-group" style="margin:0;min-width:140px;">
          <label class="form-label" for="hist-type">Type</label>
          <select class="form-select" id="hist-type">
            <option value="all">All</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>
        <div class="form-group" style="margin:0;min-width:140px;">
          <label class="form-label" for="hist-from">From</label>
          <input class="form-input" type="date" id="hist-from"/>
        </div>
        <div class="form-group" style="margin:0;min-width:140px;">
          <label class="form-label" for="hist-to">To</label>
          <input class="form-input" type="date" id="hist-to"/>
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:0;">
          <button class="btn btn--ghost btn--sm" id="hist-clear-btn" style="height:44px;">Clear</button>
        </div>
      </div>
    </div>

    <div class="card card--flat">
      <div class="flex-between mb-md">
        <span class="text-muted" id="hist-count" style="font-size:0.88rem;">— transactions</span>
      </div>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr><th>Date</th><th>Type</th><th>Category / Source</th><th>Description / Notes</th><th class="text-right">Amount</th><th>Action</th></tr>
          </thead>
          <tbody id="history-table-body">
            <tr><td colspan="6" class="text-center text-muted" style="padding:32px;">No transactions found.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/transactions.js"></script>
<script src="js/history.js"></script>
</body>
</html>
