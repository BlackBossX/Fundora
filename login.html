<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Fundora</title>
  <meta name="description" content="Log in to your Fundora account to manage your student finances."/>
  <link rel="stylesheet" href="assets/css/style.css?v=1.5"/>
  <link rel="stylesheet" href="assets/css/auth.css?v=1.3"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
  </div>

  <div class="auth-card animate-fade-up">
    <a href="index.html" class="auth-card__logo">
      <img src="assets/icons/Logo trans.png" alt="Fundora"/>
      <span>Fundora</span>
    </a>
    <h1 class="auth-card__title">Welcome back</h1>
    <p class="auth-card__sub">Sign in to your account</p>

    <div id="auth-alert" class="alert alert--danger hidden" style="margin-bottom:16px;" role="alert"></div>

    <form id="login-form" novalidate autocomplete="on">
      <!-- Email -->
      <div class="form-group" id="grp-login-email">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-input" type="email" id="login-email" name="email"
               placeholder="you@example.com" autocomplete="email" required/>
        <span class="field-error" id="err-login-email" aria-live="polite"></span>
      </div>

      <!-- Password -->
      <div class="form-group" id="grp-login-password">
        <label class="form-label" for="login-password">Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="login-password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" class="toggle-pw" id="toggle-login-pw" aria-label="Show password" tabindex="-1">
            <svg id="eye-login-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-login-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="field-error" id="err-login-password" aria-live="polite"></span>
      </div>

      <button class="btn btn--primary w-full" id="login-btn" type="submit">Sign In</button>
    </form>

    <p class="auth-card__footer">
      Don't have an account? <a href="register.html">Create one →</a>
    </p>
  </div>
</div>
<script src="assets/js/app.js?v=1.2"></script>
<script src="assets/js/auth.js?v=1.3"></script>
</body>
</html>
